name: Sync to Hugging Face
on:
  push:
    branches: [main] # This triggers the sync every time you push to 'main'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # Ensures large files (manuscripts/models) are handled correctly

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Replace 'YOUR_HF_USERNAME' and 'ALQC' below
          git push --force https://MareSerenitatis12:$HF_TOKEN@huggingface.co/datasets/MareSerenitatis12/ALQC-The-Unified-Q-State-Framework main